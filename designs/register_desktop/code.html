<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ShipRecycle ERP - Business Registration</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700&amp;family=Dm+Sans:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">tailwind.config = {darkMode: "class", theme: {extend: {colors: {"surface-container-lowest": "#ffffff", "on-secondary": "#ffffff", "tertiary-fixed-dim": "#68dba9", "surface-container-low": "#f2f4f6", "outline-variant": "#c6c6cd", warning: "#EAB308", "surface-variant": "#e0e3e5", "secondary-container": "#d0e1fb", "surface-tint": "#565e74", "inverse-on-surface": "#eff1f3", secondary: "#505f76", "tertiary-container": "#002114", "secondary-fixed": "#d3e4fe", "secondary-fixed-dim": "#b7c8e1", "on-primary-fixed-variant": "#3f465c", "on-tertiary-fixed-variant": "#005137", "on-primary-fixed": "#131b2e", "on-error-container": "#93000a", "inverse-primary": "#bec6e0", "on-primary": "#ffffff", "on-error": "#ffffff", "border-base": "#E2E8F0", "on-surface": "#191c1e", "tertiary-fixed": "#85f8c4", "on-tertiary-container": "#069669", "on-tertiary-fixed": "#002114", "error-container": "#ffdad6", "surface-container-high": "#e6e8ea", "primary-fixed-dim": "#bec6e0", "primary-fixed": "#dae2fd", "inverse-surface": "#2d3133", "surface-bright": "#f7f9fb", "on-background": "#191c1e", success: "#22C55E", outline: "#76777d", info: "#0EA5E9", "on-primary-container": "#7c839b", primary: "#000000", "on-tertiary": "#ffffff", "on-secondary-fixed-variant": "#38485d", "surface-container-highest": "#e0e3e5", "primary-container": "#131b2e", "on-surface-variant": "#45464d", "surface-container": "#eceef0", error: "#ba1a1a", "surface-dim": "#d8dadc", background: "#f7f9fb", surface: "#f7f9fb", "on-secondary-container": "#54647a", "on-secondary-fixed": "#0b1c30", tertiary: "#000000"}, borderRadius: {DEFAULT: "0.25rem", lg: "0.5rem", xl: "0.75rem", full: "9999px"}, spacing: {lg: "24px", "2xl": "48px", "3xl": "64px", xl: "32px", xs: "4px", md: "16px", sm: "8px"}, fontFamily: {h4: ["Plus Jakarta Sans"], h1: ["Plus Jakarta Sans"], code: ["Fira Code"], body: ["Dm Sans"], "body-sm": ["DM Sans"], h3: ["Plus Jakarta Sans"], display: ["Plus Jakarta Sans"], h2: ["Plus Jakarta Sans"], "h1-mobile": ["Plus Jakarta Sans"], caption: ["DM Sans"], "body-lg": ["DM Sans"], headline: ["Plus Jakarta Sans"], label: ["Dm Sans"]}, fontSize: {h4: ["16px", {lineHeight: "1.35", fontWeight: "500"}], h1: ["32px", {lineHeight: "1.2", fontWeight: "700"}], code: ["14px", {lineHeight: "1.6", fontWeight: "400"}], body: ["16px", {lineHeight: "1.6", fontWeight: "400"}], "body-sm": ["14px", {lineHeight: "1.5", fontWeight: "400"}], h3: ["20px", {lineHeight: "1.3", fontWeight: "600"}], display: ["40px", {lineHeight: "1.15", fontWeight: "700"}], h2: ["24px", {lineHeight: "1.25", fontWeight: "600"}], "h1-mobile": ["28px", {lineHeight: "1.2", fontWeight: "700"}], caption: ["12px", {lineHeight: "1.4", fontWeight: "500"}], "body-lg": ["18px", {lineHeight: "1.6", fontWeight: "400"}]}}}};</script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }
        body {
            background-color: #F8FAFC;
        }
        .form-input-focus:focus {
            border-color: #059669;
            box-shadow: 0 0 0 2px rgba(5, 150, 105, 0.1);
            outline: none;
        }
    </style>
</head>
<body class="font-body text-on-surface min-h-screen flex items-center justify-center py-2xl px-md">
<!-- Main Registration Card -->
<main class="w-full max-w-[560px] bg-surface rounded-lg shadow-md p-10 flex flex-col gap-xl">
<!-- Header Section -->
<header class="text-center flex flex-col items-center">
<div class="flex items-center gap-sm mb-md">
<div class="bg-primary p-1.5 rounded-sm">
<span class="material-symbols-outlined text-white text-[20px]" data-icon="factory">factory</span>
</div>
<h2 class="font-h3 text-h3 text-primary">YardFlow  ERP</h2>
</div>
<h1 class="font-h1-mobile text-h1-mobile text-primary mb-xs">Register your business</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant">Set up your organization in 2 minutes</p>
</header>
<!-- Form Section -->
<form action="#" class="flex flex-col gap-xl" method="POST" onsubmit="event.preventDefault();">
<!-- SECTION 1: Organization Details -->
<fieldset class="flex flex-col gap-md p-0 m-0 border-none">
<legend class="font-h4 text-h4 text-primary mb-sm">Organization Details</legend>
<div class="flex flex-col gap-xs">
<label class="font-body-sm font-bold text-on-surface" for="business_name">Business Name <span class="text-error">*</span></label>
<input class="h-[42px] px-md border border-border-base rounded bg-surface font-body text-body-sm form-input-focus" id="business_name" name="business_name" placeholder="e.g. Atlantic Scrap &amp; Recovery" required="" type="text"/>
</div>
<div class="flex flex-col gap-xs">
<label class="font-body-sm font-bold text-on-surface" for="phone_number">Phone Number</label>
<input class="h-[42px] px-md border border-border-base rounded bg-surface font-body text-body-sm form-input-focus" id="phone_number" name="phone_number" placeholder="+1 (555) 000-0000" type="tel"/>
</div>
<div class="flex flex-col gap-xs">
<label class="font-body-sm font-bold text-on-surface" for="business_address">Business Address</label>
<textarea class="p-md border border-border-base rounded bg-surface font-body text-body-sm form-input-focus resize-none" id="business_address" name="business_address" placeholder="Enter full registered address..." rows="3"></textarea>
</div>
</fieldset>
<hr class="border-t border-border-base"/>
<!-- SECTION 2: Owner Account -->
<fieldset class="flex flex-col gap-md p-0 m-0 border-none">
<legend class="font-h4 text-h4 text-primary mb-sm">Owner Account</legend>
<div class="flex flex-col gap-xs">
<label class="font-body-sm font-bold text-on-surface" for="full_name">Your Full Name</label>
<input class="h-[42px] px-md border border-border-base rounded bg-surface font-body text-body-sm form-input-focus" id="full_name" name="full_name" placeholder="John Doe" type="text"/>
</div>
<div class="flex flex-col gap-xs">
<label class="font-body-sm font-bold text-on-surface" for="email">Email Address</label>
<input class="h-[42px] px-md border border-border-base rounded bg-surface font-body text-body-sm form-input-focus" id="email" name="email" placeholder="john@shiprecycle.example" type="email"/>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-md">
<div class="flex flex-col gap-xs">
<label class="font-body-sm font-bold text-on-surface" for="password">Password</label>
<input class="h-[42px] px-md border border-border-base rounded bg-surface font-body text-body-sm form-input-focus" id="password" name="password" placeholder="••••••••" type="password"/>
<!-- Strength Indicator -->
<div class="mt-xs">
<div class="flex items-center justify-between mb-1">
<span class="text-[10px] font-bold uppercase tracking-wider text-warning">Strength: Medium</span>
</div>
<div class="h-1.5 w-full bg-surface-container rounded-full overflow-hidden">
<div class="h-full bg-warning transition-all duration-300 w-3/5"></div>
</div>
</div>
</div>
<div class="flex flex-col gap-xs">
<label class="font-body-sm font-bold text-on-surface" for="confirm_password">Confirm Password</label>
<input class="h-[42px] px-md border border-border-base rounded bg-surface font-body text-body-sm form-input-focus" id="confirm_password" name="confirm_password" placeholder="••••••••" type="password"/>
</div>
</div>
</fieldset>
<!-- Actions Section -->
<div class="flex flex-col gap-md pt-sm">
<button class="w-full h-12 bg-primary text-white font-body font-bold rounded hover:opacity-90 transition-opacity flex items-center justify-center gap-sm" type="submit">
                    Create Organization &amp; Sign In
                    <span class="material-symbols-outlined text-[20px]" data-icon="arrow_forward">arrow_forward</span>
</button>
<div class="text-center">
<a class="font-body-sm font-medium text-tertiary hover:underline inline-flex items-center gap-xs" href="/login">
                        Already registered? Sign in →
                    </a>
</div>
</div>
</form>
<!-- Visual Anchor / Industrial Mood -->
<footer class="mt-sm flex justify-center opacity-40 grayscale pointer-events-none">
<div class="flex items-center gap-xl overflow-hidden whitespace-nowrap">
<span class="material-symbols-outlined text-[32px]" data-icon="precision_manufacturing">precision_manufacturing</span>
<span class="material-symbols-outlined text-[32px]" data-icon="anchor">anchor</span>
<span class="material-symbols-outlined text-[32px]" data-icon="forklift">forklift</span>
<span class="material-symbols-outlined text-[32px]" data-icon="container">box</span>
<span class="material-symbols-outlined text-[32px]" data-icon="recycling">recycling</span>
</div>
</footer>
</main>
<script>
        // Simple micro-interaction for password strength visualization (demo purposes)
        const passwordInput = document.getElementById('password');
        const strengthBar = document.querySelector('.bg-warning');
        const strengthLabel = document.querySelector('.text-warning');

        passwordInput.addEventListener('input', (e) => {
            const len = e.target.value.length;
            if (len === 0) {
                strengthBar.style.width = '0%';
                strengthLabel.innerText = 'Strength: Low';
            } else if (len < 6) {
                strengthBar.style.width = '20%';
                strengthBar.style.backgroundColor = '#EF4444';
                strengthLabel.style.color = '#EF4444';
                strengthLabel.innerText = 'Strength: Weak';
            } else if (len < 10) {
                strengthBar.style.width = '60%';
                strengthBar.style.backgroundColor = '#EAB308';
                strengthLabel.style.color = '#EAB308';
                strengthLabel.innerText = 'Strength: Medium';
            } else {
                strengthBar.style.width = '100%';
                strengthBar.style.backgroundColor = '#22C55E';
                strengthLabel.style.color = '#22C55E';
                strengthLabel.innerText = 'Strength: Strong';
            }
        });
    </script>
</body></html>
