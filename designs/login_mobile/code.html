<!DOCTYPE html>

: ["Plus Jakarta Sans"], code: ["Fira Code"], display: ["Plus Jakarta Sans"], headline: ["Plus Jakarta Sans"], label: ["Dm Sans"]}, fontSize: {caption: ["12px", {lineHeight: "1.4", fontWeight: "500"}], "body-lg": ["18px", {lineHeight: "1.6", fontWeight: "400"}], h2: ["24px", {lineHeight: "1.25", fontWeight: "600"}], "h1-mobile": ["28px", {lineHeight: "1.2", fontWeight: "700"}], "body-sm": ["14px", {lineHeight: "1.5", fontWeight: "400"}], h1: ["32px", {lineHeight: "1.2", fontWeight: "700"}], body: ["16px", {lineHeight: "1.6", fontWeight: "400"}], h3: ["20px", {lineHeight: "1.3", fontWeight: "600"}], h4: ["16px", {lineHeight: "1.35", fontWeight: "500"}], code: ["14px", {lineHeight: "1.6", fontWeight: "400"}], display: ["40px", {lineHeight: "1.15", fontWeight: "700"}]}}}};</script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #0F172A;
            overflow-x: hidden;
        }
        .slide-up {
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }

    }

  </head>
<body class="flex flex-col min-h-screen">
<!-- Top Section (40% Height) -->
<header class="h-[353px] w-full flex flex-col items-center justify-center text-center p-lg relative overflow-hidden bg-pattern">
<div class="relative z-10">
<span class="material-symbols-outlined text-surface text-[48px] mb-md" data-icon="precision_manufacturing">precision_manufacturing</span>
<h1 class="font-h1-mobile text-h1-mobile text-surface tracking-tight mb-xs">YardFlow <span style="letter-spacing: -0.025em;"> ERP</span></h1>
<p class="font-body-sm text-body-sm text-surface-container-highest opacity-90 max-w-[280px]">
                Manage your workshop. Track every kilogram.
            </p>
</div>
<!-- Decorative blurred light -->
<div class="absolute -top-20 -right-20 w-64 h-64 bg-on-tertiary-container/10 rounded-full blur-3xl"></div>
</header>
<!-- Bottom Section (White Card - 60% Height) -->
<main class="flex-grow slide-up bg-surface rounded-t-[16px] shadow-2xl z-20 flex flex-col p-lg">
<div class="w-12 h-1 bg-surface-container-high rounded-full mx-auto mb-xl opacity-50"></div>
<div class="mb-xl">
<h2 class="font-h2 text-h2 text-on-surface mb-xs">Welcome back</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant">Sign in to your organization</p>
</div>
<form class="space-y-lg flex flex-col flex-grow" id="loginForm">
<!-- Email Input -->
<div class="space-y-xs">
<label class="font-body-sm text-body-sm font-bold text-on-surface" for="email">Email address</label>
<div class="relative">
<input class="w-full h-[42px] px-md bg-surface border border-border-base rounded-DEFAULT font-body-sm text-on-surface focus:outline-none focus:ring-1 focus:ring-on-tertiary-container transition-all" id="email" name="email" placeholder="admin@shiprecycle.com" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-xs">
<label class="font-body-sm text-body-sm font-bold text-on-surface" for="password">Password</label>
<div class="relative">
<input class="w-full h-[42px] px-md pr-[44px] bg-surface border border-border-base rounded-DEFAULT font-body-sm text-on-surface focus:outline-none focus:ring-1 focus:ring-on-tertiary-container transition-all" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-md top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface transition-colors" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined text-[20px]" id="passToggleIcon">visibility</span>
</button>
</div>
</div>
<!-- Forgot Password -->
<div class="flex justify-end">
<a class="font-body-sm text-body-sm text-on-tertiary-container font-medium hover:underline" href="#">Forgot password?</a>
</div>
<!-- Sign In Button -->
<button class="w-full h-[48px] bg-primary-container text-surface font-bold rounded-DEFAULT flex items-center justify-center gap-sm hover:opacity-90 active:scale-[0.98] transition-all" type="submit">
                Sign In
                <span class="material-symbols-outlined text-[20px]">login</span>
</button>
<!-- Divider -->
<div class="flex items-center gap-md py-sm">
<div class="h-[1px] flex-grow bg-surface-container-high"></div>
<span class="font-caption text-caption text-on-surface-variant uppercase tracking-widest">or</span>
<div class="h-[1px] flex-grow bg-surface-container-high"></div>
</div>
<!-- Register Button -->
<button class="w-full h-[48px] bg-transparent border-2 border-primary-container text-primary-container font-bold rounded-DEFAULT hover:bg-surface-container-low transition-colors" type="button">
                Register your business
            </button>
</form>
<!-- Footer Text -->
<footer class="mt-auto pt-2xl pb-lg text-center">
<p class="font-caption text-caption text-on-surface-variant/70 flex items-center justify-center gap-xs">
<span class="material-symbols-outlined text-[14px]">verified_user</span>
                Multi-tenant — your data is completely private
            </p>
</footer>
</main>
<script>
        function togglePassword() {
            const passInput = document.getElementById('password');
            const toggleIcon = document.getElementById('passToggleIcon');
            
            if (passInput.type === 'password') {
                passInput.type = 'text';
                toggleIcon.innerText = 'visibility_off';
            } else {
                passInput.type = 'password';
                toggleIcon.innerText = 'visibility';
            }
        }

        // Form submission ripple effect
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = this.querySelector('button[type="submit"]');
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span>';
            setTimeout(() => {
                btn.innerHTML = 'Signing in...';
            }, 800);
        });
    </script>
</body></html>
