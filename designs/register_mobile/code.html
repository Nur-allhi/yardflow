mobile": ["Plus Jakarta Sans"], caption: ["DM Sans"], "body-lg": ["DM Sans"], headline: ["Plus Jakarta Sans"], label: ["Dm Sans"]}, fontSize: {h4: ["16px", {lineHeight: "1.35", fontWeight: "500"}], h1: ["32px", {lineHeight: "1.2", fontWeight: "700"}], code: ["14px", {lineHeight: "1.6", fontWeight: "400"}], body: ["16px", {lineHeight: "1.6", fontWeight: "400"}], "body-sm": ["14px", {lineHeight: "1.5", fontWeight: "400"}], h3: ["20px", {lineHeight: "1.3", fontWeight: "600"}], display: ["40px", {lineHeight: "1.15", fontWeight: "700"}], h2: ["24px", {lineHeight: "1.25", fontWeight: "600"}], "h1-mobile": ["28px", {lineHeight: "1.2", fontWeight: "700"}], caption: ["12px", {lineHeight: "1.4", fontWeight: "500"}], "body-lg": ["18px", {lineHeight: "1.6", fontWeight: "400"}]}}}};</script>

  </head>
<body class="bg-background min-h-screen text-on-surface antialiased">
<!-- Sticky Header -->
<header class="sticky top-0 z-50 bg-surface/80 backdrop-blur-md px-[20px] py-md border-b border-border-base">
<div class="flex flex-col gap-xs">
<span class="font-h3 text-h3 text-primary-container tracking-tight">YardFlow ERP</span>
<h1 class="font-h1-mobile text-h1-mobile text-on-surface">Register your business</h1>
</div>
</header>
<main class="px-[20px] pt-lg pb-[120px]">
<form class="flex flex-col gap-xl" id="registrationForm">
<!-- Section 1: Organization Details -->
<section class="flex flex-col gap-lg">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-primary-container" style="font-variation-settings: 'FILL' 1;">corporate_fare</span>
<h2 class="font-h3 text-h3">Organization Details</h2>
</div>
<div class="grid gap-md">
<!-- Business Name -->
<div class="flex flex-col gap-xs">
<label class="font-body text-body-sm font-bold text-on-surface-variant" for="business_name">Business Name</label>
<input class="h-[42px] px-md rounded-DEFAULT border border-border-base focus:border-tertiary-container focus:ring-1 focus:ring-tertiary-container outline-none transition-all placeholder:text-outline-variant bg-surface" id="business_name" name="business_name" placeholder="e.g. Atlantic Scrap Metal Ltd." required="" type="text"/>
</div>
<!-- Phone -->
<div class="flex flex-col gap-xs">
<label class="font-body text-body-sm font-bold text-on-surface-variant" for="phone">Phone Number</label>
<div class="relative">
<input class="w-full h-[42px] px-md rounded-DEFAULT border border-border-base focus:border-tertiary-container focus:ring-1 focus:ring-tertiary-container outline-none transition-all placeholder:text-outline-variant bg-surface" id="phone" name="phone" placeholder="+1 (555) 000-0000" required="" type="tel"/>
</div>
</div>
<!-- Address -->
<div class="flex flex-col gap-xs">
<label class="font-body text-body-sm font-bold text-on-surface-variant" for="address">Business Address</label>
<textarea class="p-md rounded-DEFAULT border border-border-base focus:border-tertiary-container focus:ring-1 focus:ring-tertiary-container outline-none transition-all placeholder:text-outline-variant bg-surface resize-none" id="address" name="address" placeholder="Enter full maritime or shipyard address..." required="" rows="3"></textarea>
</div>
</div>
</section>
<!-- Divider -->
<div class="h-[1px] bg-outline-variant/30"></div>
<!-- Section 2: Owner Account -->
<section class="flex flex-col gap-lg">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-primary-container" style="font-variation-settings: 'FILL' 1;">account_circle</span>
<h2 class="font-h3 text-h3">Owner Account</h2>
</div>
<div class="grid gap-md">
<!-- Full Name -->
<div class="flex flex-col gap-xs">
<label class="font-body text-body-sm font-bold text-on-surface-variant" for="full_name">Full Name</label>
<input class="h-[42px] px-md rounded-DEFAULT border border-border-base focus:border-tertiary-container focus:ring-1 focus:ring-tertiary-container outline-none transition-all placeholder:text-outline-variant bg-surface" id="full_name" name="full_name" placeholder="John Doe" required="" type="text"/>
</div>
<!-- Email -->
<div class="flex flex-col gap-xs">
<label class="font-body text-body-sm font-bold text-on-surface-variant" for="email">Email Address</label>
<input class="h-[42px] px-md rounded-DEFAULT border border-border-base focus:border-tertiary-container focus:ring-1 focus:ring-tertiary-container outline-none transition-all placeholder:text-outline-variant bg-surface" id="email" name="email" placeholder="admin@shiprecycle.com" required="" type="email"/>
</div>
<!-- Password -->
<div class="flex flex-col gap-xs">
<label class="font-body text-body-sm font-bold text-on-surface-variant" for="password">Password</label>
<div class="relative">
<input class="w-full h-[42px] px-md rounded-DEFAULT border border-border-base focus:border-tertiary-container focus:ring-1 focus:ring-tertiary-container outline-none transition-all placeholder:text-outline-variant bg-surface" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-md top-1/2 -translate-y-1/2 text-on-surface-variant/60" onclick="togglePassword('password')" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
<!-- Strength Bar -->
<div class="mt-xs">
<div class="w-full bg-surface-container-high h-[4px] rounded-full overflow-hidden">
<div class="password-strength-meter w-0 bg-error" id="strengthBar"></div>
</div>
<span class="font-caption text-caption text-on-surface-variant mt-[2px] block" id="strengthText">Strength: Empty</span>
</div>
</div>
<!-- Confirm Password -->
<div class="flex flex-col gap-xs">
<label class="font-body text-body-sm font-bold text-on-surface-variant" for="confirm_password">Confirm Password</label>
<div class="relative">
<input class="w-full h-[42px] px-md rounded-DEFAULT border border-border-base focus:border-tertiary-container focus:ring-1 focus:ring-tertiary-container outline-none transition-all placeholder:text-outline-variant bg-surface" id="confirm_password" name="confirm_password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-md top-1/2 -translate-y-1/2 text-on-surface-variant/60" onclick="togglePassword('confirm_password')" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
</div>
</section>
<!-- Terms & Policy -->
<p class="font-caption text-caption text-on-surface-variant text-center px-md">
                By creating an account, you agree to our 
                <a class="text-tertiary-container font-bold hover:underline" href="#">Terms of Service</a> and 
                <a class="text-tertiary-container font-bold hover:underline" href="#">Privacy Policy</a>.
            </p>
</form>
</main>
<!-- Sticky Footer CTA -->
<footer class="fixed bottom-0 left-0 right-0 bg-surface border-t border-border-base px-[20px] py-lg shadow-[0_-4px_12px_rgba(15,23,42,0.05)]">
<button class="w-full h-[48px] bg-primary-container text-on-primary font-body font-bold rounded-lg flex items-center justify-center gap-sm active:scale-[0.98] transition-transform" form="registrationForm" type="submit">
<span class="">Create Organization &amp; Sign In</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
</footer>
<script>
        function togglePassword(id) {
            const input = document.getElementById(id);
            const btn = input.nextElementSibling.querySelector('span');
            if (input.type === 'password') {
                input.type = 'text';
                btn.textContent = 'visibility_off';
            } else {
                input.type = 'password';
                btn.textContent = 'visibility';
            }
        }

        const passwordInput = document.getElementById('password');
        const strengthBar = document.getElementById('strengthBar');
        const strengthText = document.getElementById('strengthText');

        passwordInput.addEventListener('input', () => {
            const val = passwordInput.value;
            let strength = 0;
            
            if (val.length > 0) strength += 20;
            if (val.length > 7) strength += 20;
            if (/[A-Z]/.test(val)) strength += 20;
            if (/[0-9]/.test(val)) strength += 20;
            if (/[^A-Za-z0-9]/.test(val)) strength += 20;

            strengthBar.style.width = strength + '%';
            
            if (strength <= 20) {
                strengthBar.className = 'password-strength-meter bg-error';
                strengthText.textContent = 'Strength: Weak';
                strengthText.className = 'font-caption text-caption text-error mt-[2px] block';
            } else if (strength <= 60) {
                strengthBar.className = 'password-strength-meter bg-warning';
                strengthText.textContent = 'Strength: Moderate';
                strengthText.className = 'font-caption text-caption text-warning mt-[2px] block';
            } else {
                strengthBar.className = 'password-strength-meter bg-success';
                strengthText.textContent = 'Strength: Strong';
                strengthText.className = 'font-caption text-caption text-success mt-[2px] block';
            }

            if (val.length === 0) {
                strengthBar.style.width = '0%';
                strengthText.textContent = 'Strength: Empty';
                strengthText.className = 'font-caption text-caption text-on-surface-variant mt-[2px] block';
            }
        });

        // Form submission micro-interaction
        document.getElementById('registrationForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.closest('body').querySelector('footer button');
            const originalContent = btn.innerHTML;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> Processing...';
            btn.disabled = true;
            
            setTimeout(() => {
                btn.innerHTML = '<span class="material-symbols-outlined">check_circle</span> Success!';
                btn.classList.replace('bg-primary-container', 'bg-success');
            }, 1500);
        });
    </script>
</body></html>
