<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ShipRecycle ERP - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700&amp;family=Dm+Sans:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">tailwind.config = {darkMode: "class", theme: {extend: {colors: {"on-primary-container": "#7c839b", "on-surface": "#191c1e", "on-error": "#ffffff", "on-background": "#191c1e", tertiary: "#000000", "surface-container-high": "#e6e8ea", "surface-tint": "#565e74", surface: "#f7f9fb", "primary-fixed": "#dae2fd", "on-primary-fixed-variant": "#3f465c", "secondary-fixed": "#d3e4fe", background: "#f7f9fb", "primary-container": "#131b2e", "border-base": "#E2E8F0", "on-secondary-fixed-variant": "#38485d", "on-tertiary-fixed-variant": "#005137", "tertiary-fixed": "#85f8c4", "surface-container-highest": "#e0e3e5", success: "#22C55E", "tertiary-fixed-dim": "#68dba9", "on-tertiary-fixed": "#002114", outline: "#76777d", "inverse-surface": "#2d3133", "primary-fixed-dim": "#bec6e0", info: "#0EA5E9", "on-secondary-container": "#54647a", "secondary-container": "#d0e1fb", secondary: "#505f76", "surface-container": "#eceef0", "on-primary": "#ffffff", "tertiary-container": "#002114", warning: "#EAB308", "inverse-on-surface": "#eff1f3", "surface-container-lowest": "#ffffff", "surface-variant": "#e0e3e5", primary: "#000000", "surface-bright": "#f7f9fb", "on-error-container": "#93000a", "surface-dim": "#d8dadc", "on-secondary-fixed": "#0b1c30", "secondary-fixed-dim": "#b7c8e1", "error-container": "#ffdad6", "surface-container-low": "#f2f4f6", "inverse-primary": "#bec6e0", "on-primary-fixed": "#131b2e", "on-tertiary": "#ffffff", error: "#ba1a1a", "outline-variant": "#c6c6cd", "on-tertiary-container": "#069669", "on-secondary": "#ffffff", "on-surface-variant": "#45464d"}, borderRadius: {DEFAULT: "0.25rem", lg: "0.5rem", xl: "0.75rem", full: "9999px"}, spacing: {xs: "4px", "2xl": "48px", lg: "24px", md: "16px", xl: "32px", "3xl": "64px", sm: "8px"}, fontFamily: {caption: ["DM Sans"], "body-lg": ["DM Sans"], h2: ["Plus Jakarta Sans"], "h1-mobile": ["Plus Jakarta Sans"], "body-sm": ["DM Sans"], h1: ["Plus Jakarta Sans"], body: ["Dm Sans"], h3: ["Plus Jakarta Sans"], h4: ["Plus Jakarta Sans"], code: ["Fira Code"], display: ["Plus Jakarta Sans"], headline: ["Plus Jakarta Sans"], label: ["Dm Sans"]}, fontSize: {caption: ["12px", {lineHeight: "1.4", fontWeight: "500"}], "body-lg": ["18px", {lineHeight: "1.6", fontWeight: "400"}], h2: ["24px", {lineHeight: "1.25", fontWeight: "600"}], "h1-mobile": ["28px", {lineHeight: "1.2", fontWeight: "700"}], "body-sm": ["14px", {lineHeight: "1.5", fontWeight: "400"}], h1: ["32px", {lineHeight: "1.2", fontWeight: "700"}], body: ["16px", {lineHeight: "1.6", fontWeight: "400"}], h3: ["20px", {lineHeight: "1.3", fontWeight: "600"}], h4: ["16px", {lineHeight: "1.35", fontWeight: "500"}], code: ["14px", {lineHeight: "1.6", fontWeight: "400"}], display: ["40px", {lineHeight: "1.15", fontWeight: "700"}]}}}};</script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .sage-icon {
            color: #069669; /* on-tertiary-container */
        }
    </style>
</head>
<body class="bg-background font-body text-on-background m-0 p-0 overflow-hidden">
<main class="flex min-h-screen w-full">
<!-- Left Side: Brand Anchor -->
<section class="hidden lg:flex flex-col justify-center items-start w-1/2 bg-primary-container p-3xl relative overflow-hidden">
<!-- Subtle background pattern -->
<div class="absolute inset-0 opacity-10 pointer-events-none" style="background-image: radial-gradient(#7c839b 1px, transparent 1px); background-size: 32px 32px;"></div>
<div class="relative z-10 space-y-xl max-w-lg">
<div class="space-y-sm">
<h1 class="font-h1 text-h1 text-on-primary">YardFlow ERP</h1>
<p class="font-body text-body text-[#94A3B8]">Manage your workshop. Track every kilogram.</p>
</div>
<ul class="space-y-md">
<li class="flex items-center gap-md">
<span class="material-symbols-outlined sage-icon" data-icon="inventory_2">inventory_2</span>
<span class="font-body-sm text-body-sm text-on-primary">Inventory &amp; Stock Tracking</span>
</li>
<li class="flex items-center gap-md">
<span class="material-symbols-outlined sage-icon" data-icon="payments">payments</span>
<span class="font-body-sm text-body-sm text-on-primary">Sales, Purchases &amp; Dues</span>
</li>
<li class="flex items-center gap-md">
<span class="material-symbols-outlined sage-icon" data-icon="analytics">analytics</span>
<span class="font-body-sm text-body-sm text-on-primary">Payroll &amp; Reports</span>
</li>
</ul>
</div>
<!-- Ambient Lighting Detail -->
<div class="absolute bottom-[-10%] left-[-10%] w-[400px] h-[400px] bg-on-tertiary-container opacity-10 blur-[120px] rounded-full"></div>
</section>
<!-- Right Side: Login Form -->
<section class="w-full lg:w-1/2 flex items-center justify-center p-lg bg-[#F8FAFC]">
<div class="w-full max-w-[520px] bg-surface rounded-lg shadow-[0_4px_24px_rgba(15,23,42,0.05)] p-2xl">
<div class="mb-xl text-center lg:text-left">
<h2 class="font-h2 text-h2 text-[#0F172A] mb-xs">Welcome back</h2>
<p class="font-body text-body text-[#64748B]">Sign in to your organization</p>
</div>
<form class="space-y-lg" onsubmit="event.preventDefault();">
<!-- Email Input -->
<div class="space-y-xs">
<label class="block font-body-sm text-body-sm font-bold text-[#0F172A]" for="email">Email Address</label>
<input class="w-full h-[42px] px-md border border-border-base rounded-DEFAULT bg-white focus:ring-1 focus:ring-on-tertiary-container focus:border-on-tertiary-container outline-none transition-all placeholder:text-on-surface-variant/50" id="email" placeholder="name@company.com" type="email"/>
</div>
<!-- Password Input -->
<div class="space-y-xs">
<div class="flex justify-between items-center">
<label class="block font-body-sm text-body-sm font-bold text-[#0F172A]" for="password">Password</label>
<button class="text-on-tertiary-container font-body-sm text-body-sm font-medium hover:underline" type="button">Forgot password?</button>
</div>
<div class="relative">
<input class="w-full h-[42px] px-md pr-xl border border-border-base rounded-DEFAULT bg-white focus:ring-1 focus:ring-on-tertiary-container focus:border-on-tertiary-container outline-none transition-all placeholder:text-on-surface-variant/50" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-md top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface transition-colors" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility" id="password-icon">visibility</span>
</button>
</div>
</div>
<!-- Sign In Button -->
<button class="w-full h-12 bg-primary-container text-on-primary font-body font-bold rounded-lg hover:bg-primary-container/90 transition-all flex items-center justify-center gap-sm" type="submit">
                        Sign In
                    </button>
<!-- Divider -->
<div class="relative flex items-center py-sm">
<div class="flex-grow border-t border-border-base"></div>
<span class="flex-shrink mx-md text-[#94A3B8] font-caption text-caption">or</span>
<div class="flex-grow border-t border-border-base"></div>
</div>
<!-- Register Button -->
<button class="w-full h-12 border border-primary-container text-primary-container font-body font-bold rounded-lg hover:bg-surface-container-low transition-all" type="button">
                        Register your business
                    </button>
</form>
<footer class="mt-2xl text-center">
<p class="font-body-sm text-body-sm text-[#94A3B8]">Multi-tenant — your data is completely private</p>
</footer>
</div>
</section>
</main>
<script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const icon = document.getElementById('password-icon');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.innerText = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                icon.innerText = 'visibility';
            }
        }

        // Add subtle interactivity
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.closest('.space-y-xs').querySelector('label').style.color = '#069669';
            });
            input.addEventListener('blur', () => {
                input.parentElement.closest('.space-y-xs').querySelector('label').style.color = '#0F172A';
            });
        });
    </script>
</body></html>
